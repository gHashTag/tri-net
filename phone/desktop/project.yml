name: TriNetMonitor
options:
  bundleIdPrefix: com.trinet
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: YES
targets:
  TriNetMonitor:
    type: application
    platform: macOS
    sources:
      - path: DesignSystem.swift
      - path: TriNetMonitor.swift
      - path: RTIHeatmap.swift
      - path: VideoCallTab.swift
      - path: TriNetVideo/CallManager.swift
      - path: TriNetVideo/CameraCapture.swift
      - path: TriNetVideo/ScreenCapture.swift
      - path: TriNetVideo/CallRecorder.swift
      - path: TriNetVideo/BackgroundBlur.swift
      - path: TriNetVideo/MeshTransport.swift
      - path: TriNetVideo/VideoDecoder.swift
      - path: TriNetVideo/VideoEncoder.swift
      - path: TriNetVideo/AudioController.swift
      - path: TriNetVideo/MeshCrypto.swift
      - path: TriNetVideo/LinkStatus.swift
      - path: TriNetVideo/OpusCodec.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.trinet.monitor
        PRODUCT_NAME: TriNetMonitor
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "TRI-NET Monitor"
        INFOPLIST_KEY_NSCameraUsageDescription: "Mesh monitor"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Audio for mesh video calls"
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: "Monitor mesh network devices"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: YES
