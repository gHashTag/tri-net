# Lefthook -- tri-net golden pipeline enforcement.
# phi^2 + phi^-2 = 3 | TRINITY
#
# Enforces SOUL.md / AGENTS.md laws L1-L7 at commit/push time. The single
# reviewable exception surface is .t27-allowlist (see that file). Activate in
# a clone with `lefthook install`; policy lives here, activation is per-clone.
#
# Design notes:
#   * ASCII gate tolerates the ONE known non-ASCII byte t27c emits in its
#     generated banner ("DO NOT EDIT ... generated by t27c"), matched by an
#     ASCII-only regex, so the pipeline's own output does not fail the
#     pipeline's own purity rule. All other non-ASCII is still rejected.
#   * Hand-written implementation under src/ (including src/bin/) and any
#     non-generated file under gen/ must appear in .t27-allowlist, so every
#     pipeline exception is visible in the PR diff and vetoable by review.

pre-commit:
  parallel: false
  commands:

    ascii-only:
      run: |
        files=$(git diff --cached --name-only --diff-filter=ACM | grep -E '\.(rs|t27|v)$' || true)
        [ -z "$files" ] && exit 0
        bad=""
        for f in $files; do
          [ -f "$f" ] || continue
          if grep -vE 'DO NOT EDIT.*generated by t27c' "$f" | grep -qP '[^\x00-\x7F]'; then
            bad="$bad $f"
          fi
        done
        if [ -n "$bad" ]; then
          echo "VIOLATION L3 (PURITY): non-ASCII in:$bad"
          exit 1
        fi

    no-cyrillic:
      run: |
        # Byte-based match for the Cyrillic block (U+0400-04FF encodes as UTF-8
        # lead 0xD0-0xD3 + continuation 0x80-0xBF). The codepoint-class form
        # `\x{0400}` errors on some grep-PCRE builds and silently no-ops, so we
        # match bytes under LC_ALL=C instead. Covers .md docs that the
        # ascii-only gate (rs/t27/v only) does not.
        files=$(git diff --cached --name-only --diff-filter=ACM || true)
        [ -z "$files" ] && exit 0
        bad=""
        for f in $files; do
          [ -f "$f" ] || continue
          if LC_ALL=C grep -qP '[\xd0-\xd3][\x80-\xbf]' "$f"; then bad="$bad $f"; fi
        done
        if [ -n "$bad" ]; then
          echo "VIOLATION L3 (PURITY): Cyrillic in:$bad"
          exit 1
        fi

    no-gen-edits:
      run: |
        gen_files=$(git diff --cached --name-only --diff-filter=ACMR | grep '^gen/' || true)
        if [ -n "$gen_files" ]; then
          echo "VIOLATION L2 (GENERATION): direct edit to gen/ (edit the spec, run t27c):"
          echo "$gen_files"
          exit 1
        fi

    handwritten-logic-allowlist:
      run: |
        # Any staged .rs under src/ that defines logic (fn/struct/enum/impl/
        # trait) must be listed in .t27-allowlist. This closes the src/bin/
        # smuggling gap: new hand-written bins need a reviewable allowlist line.
        allow=".t27-allowlist"
        rs=$(git diff --cached --name-only --diff-filter=ACMR | grep -E '^src/.*\.rs$' || true)
        [ -z "$rs" ] && exit 0
        allowed() { awk 'NF && $1 !~ /^#/ {print $1}' "$allow" 2>/dev/null | grep -qxF "$1"; }
        bad=""
        for f in $rs; do
          [ -f "$f" ] || continue
          logic=$(grep -cE '^[[:space:]]*(pub[[:space:]]+)?(fn|struct|enum|impl|trait)[[:space:]]' "$f" 2>/dev/null || echo 0)
          if [ "$logic" -gt 0 ] && ! allowed "$f"; then
            bad="$bad $f($logic)"
          fi
        done
        if [ -n "$bad" ]; then
          echo "VIOLATION L6 (PIPELINE): hand-written Rust logic not in .t27-allowlist:"
          echo " $bad"
          echo "Move logic to specs/*.t27 + t27c, or add a reviewed .t27-allowlist line."
          exit 1
        fi

    spec-has-tests:
      glob: "*.t27"
      run: |
        for f in $(git diff --cached --name-only --diff-filter=ACMR | grep '\.t27$'); do
          [ -f "$f" ] || continue
          if ! grep -qE '^[[:space:]]*(test|invariant|bench)[[:space:]]' "$f"; then
            echo "VIOLATION L4 (TESTABILITY): $f has no test/invariant/bench block"
            exit 1
          fi
        done

    golden-anchor:
      run: |
        # L5 IDENTITY: specs and generated artifacts must carry the anchor.
        files=$(git diff --cached --name-only --diff-filter=ACM | grep -E '\.(t27)$|^gen/' || true)
        [ -z "$files" ] && exit 0
        bad=""
        for f in $files; do
          [ -f "$f" ] || continue
          if ! grep -qE 'phi\^2 \+ (phi\^-2|1/phi\^2) = 3' "$f"; then
            bad="$bad $f"
          fi
        done
        if [ -n "$bad" ]; then
          echo "VIOLATION L5 (IDENTITY): missing anchor 'phi^2 + phi^-2 = 3' in:$bad"
          exit 1
        fi

    no-shell-scripts:
      run: |
        # L7 UNITY: no new shell on the critical path. smoke/ and tools/ are
        # the CLAUDE.md-sanctioned exceptions (test runners, HW bring-up).
        sh_files=$(git diff --cached --name-only --diff-filter=ACMR | grep '\.sh$' | grep -vE '^(smoke|tools)/' || true)
        if [ -n "$sh_files" ]; then
          echo "VIOLATION L7 (UNITY): new shell script outside smoke/ or tools/:"
          echo "$sh_files"
          echo "Use Rust (cargo) or t27c instead."
          exit 1
        fi

pre-push:
  parallel: false
  commands:

    gen-provenance:
      run: |
        # Repo-wide audit: every gen/rust/*.rs must either carry the canonical
        # t27c banner AND have a matching specs/<name>.t27, or be listed in
        # .t27-allowlist (quarantined exceptions). Catches hand-authored files
        # masquerading as generated output.
        allow=".t27-allowlist"
        allowed() { awk 'NF && $1 !~ /^#/ {print $1}' "$allow" 2>/dev/null | grep -qxF "$1"; }
        bad=""
        for f in gen/rust/*.rs; do
          [ -f "$f" ] || continue
          allowed "$f" && continue
          base=$(basename "$f" .rs)
          if ! head -3 "$f" | grep -qE 'DO NOT EDIT.*generated by t27c'; then
            bad="$bad $f(no-banner)"
            continue
          fi
          if [ ! -f "specs/$base.t27" ]; then
            bad="$bad $f(no-spec)"
          fi
        done
        if [ -n "$bad" ]; then
          echo "VIOLATION L2 (GENERATION): gen provenance failed:$bad"
          echo "Regenerate via t27c, or add a reviewed .t27-allowlist line."
          exit 1
        fi
        echo "gen-provenance: OK"

    specs-parse:
      run: |
        T27C=../t27/target/release/t27c
        if [ ! -f "$T27C" ]; then
          echo "specs-parse: SKIP (t27c not present at $T27C) -- cannot verify parse in this env"
          exit 0
        fi
        for spec in specs/*.t27; do
          if ! "$T27C" parse "$spec" > /dev/null 2>&1; then
            echo "PARSE FAIL: $spec"
            exit 1
          fi
        done
        echo "specs-parse: all specs parse OK"

    stale-gen:
      run: |
        # Staleness gate: regenerate each spec and diff against its gen sibling.
        # Requires t27c; skips (cannot verify) when the toolchain is absent.
        T27C=../t27/target/release/t27c
        if [ ! -f "$T27C" ]; then
          echo "stale-gen: SKIP (t27c not present) -- staleness unverifiable in this env"
          exit 0
        fi
        stale=""
        for spec in specs/*.t27; do
          base=$(basename "$spec" .t27)
          gen="gen/rust/$base.rs"
          [ -f "$gen" ] || continue
          tmp=$(mktemp)
          if "$T27C" gen-rust "$spec" > "$tmp" 2>/dev/null; then
            diff -q "$tmp" "$gen" >/dev/null 2>&1 || stale="$stale $gen"
          fi
          rm -f "$tmp"
        done
        if [ -n "$stale" ]; then
          echo "VIOLATION L2 (GENERATION): stale generated output:$stale"
          echo "Run: for s in specs/*.t27; do t27c gen-rust \$s > gen/rust/\$(basename \$s .t27).rs; done"
          exit 1
        fi
        echo "stale-gen: all generated output current"

    cargo-build:
      run: |
        # ADVISORY (not a hard gate): the crate currently fails to compile due
        # to pre-existing invalid t27c codegen inherited from main (the `let;`
        # split bug in gen/rust/adaptive_routing.rs, flow_control.rs, etc.).
        # Blocking here would make the repo unpushable on a pre-existing
        # condition unrelated to the committer's change. Flip to a hard gate
        # (exit 1 on failure) once t27c codegen is fixed and the tree builds.
        if ! command -v cargo >/dev/null 2>&1; then
          echo "cargo-build: SKIP (cargo not present)"
          exit 0
        fi
        if cargo build --release >/tmp/tri-cargo-build.log 2>&1; then
          echo "cargo-build: OK"
        else
          echo "cargo-build: ADVISORY FAIL (pre-existing t27c codegen bug; see /tmp/tri-cargo-build.log)"
        fi
        exit 0
